<!doctype html>
<html lang="it">
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1, user-scalable=no'>
    <title>XR Interface - Web AR</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --neon-purple: #9d00ff;
            --bg-color: #7d7d7d; /* Il tuo grigio */
        }

        body {
            background-color: var(--bg-color);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
        }

        /* 1. Canvas 3D (Z-index basso e mezzo trasparente per vederlo) */
        canvas {
            position: absolute !important;
            top: 0; left: 0;
            z-index: 1; 
            opacity: 0.5; /* Aumentato un po' per staccare dal grigio */
            pointer-events: none !important;
        }

        /* 2. Box dell'interfaccia */
        .interface-box {
            position: relative;
            padding: 40px;
            width: 100%;
            height: 100%;
            /* Usiamo la versione RGBA del tuo grigio per farlo un po' trasparente (0.9) e vedere dietro */
            background: rgba(125, 125, 125, 1); 
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10; /* Sopra al canvas */
            min-width: 300px;
        }

        .tech-accent {
            color: white;
            font-family: monospace;
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .app-btn {
            background: transparent;
            color: #fff;
            text-decoration: none;
            padding: 15px 40px;
            border-radius: 4px;
            font-family: monospace;
            border: 1px solid white;
            width: 50%;
            text-align: center;
            margin-bottom: 20px;
            text-transform: uppercase;
            cursor: pointer;
            box-sizing: border-box;
            display: block;
        }

        model-viewer {
            height: 50%;
            width: 100%;
            border-radius: 4px;
        }

        /* 3. Il tasto AR nativo di Three.js (Allineamento Sistemato) */
        #ARButton {
            position: fixed !important; 
            bottom: 20% !important;     
            left: 50% !important;
            transform: translateX(-50%) !important;
            z-index: 999 !important; /* Sopra a tutto il resto */
            background: #fff !important;
            color: #000 !important;
            border: none !important;
            border-radius: 4px !important;
            width: calc(100% - 60px) !important;
            max-width: 320px !important;
            padding: 15px !important;
            cursor: pointer !important;
            font-family: monospace;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-align: center !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3) !important;
        }
    </style>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
</head>
<body>
    <div onclick="window.history.back();" style="z-index: 999; position: absolute; top: 25px; right: 25px; color: white; font-size: 32px; cursor: pointer; pointer-events: auto;">✕</div>
    <div id="ar-overlay" style="display: none; position: absolute; inset: 0; z-index: 999; pointer-events: none;">

        <div id="ar-prompt" style="display: none; position: absolute; top: 20%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.7); color: white; padding: 15px 25px; border-radius: 30px; font-weight: bold; text-align: center; border: 1px solid white; pointer-events: none; text-shadow: 0 2px 4px rgba(0,0,0,0.5); width: 80%; max-width: 300px;">
            Slowly move your phone to detect the surface.
        </div>

        <div id="m-btn-close" style="position: absolute; top: 25px; right: 25px; color: white; font-size: 32px; cursor: pointer; pointer-events: auto;">✕</div>
        
        <div id="object-selector" style="
            position: absolute; 
            bottom: 100px;
            left: 20px; 
            height: 160px;
            width: 140px;
            background: rgba(0, 0, 0, 0.65);
            border-radius: 15px;
            padding: 10px; 
            overflow-y: auto;
            overflow-x: hidden;
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            pointer-events: auto;
            touch-action: pan-y;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.1);
        ">
        </div>

        <div class="d-flex justify-content-center align-items-center gap-2" style="position: absolute; bottom: 30px; left: 0; width: 100%; padding: 0 20px; pointer-events: auto;">
            
            <button id="m-btn-play" class="btn btn-light rounded-circle shadow-sm" style="width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;">
                <i class="bi bi-play-fill"></i>
            </button>

            <div class="btn-group shadow-sm" role="group">
                <button id="m-btn-zoom-out" class="btn btn-dark border-secondary px-3" style="background: rgba(0,0,0,0.7);">
                    <i class="bi bi-dash-lg"></i>
                </button>
                <button id="m-btn-zoom-in" class="btn btn-dark border-secondary px-3" style="background: rgba(0,0,0,0.7);">
                    <i class="bi bi-plus-lg"></i>
                </button>
            </div>

            <button id="m-btn-rotate" class="btn btn-dark rounded-circle shadow-sm border-secondary" style="width: 50px; height: 50px; background: rgba(0,0,0,0.7);">
                <i class="bi bi-arrow-repeat"></i>
            </button>

            <button id="m-btn-delete" class="btn btn-danger rounded-circle shadow-sm" style="width: 50px; height: 50px;">
                <i class="bi bi-trash"></i>
            </button>

            <button id="m-btn-repo" class="btn rounded-circle shadow-sm text-white" style="width: 50px; height: 50px; background: var(--neon-purple); border: none;">
                <i class="bi bi-arrows-move"></i>
            </button>
        </div>
    </div>

    <div class="interface-box">
        <div class="tech-accent">Powered By XRi</div>
        
        <a href="xri://" id="appLink" class="app-btn">USE APP</a>
        
        <model-viewer id="ios-fallback-viewer" camera-controls auto-rotate shadow-intensity="1" src=""></model-viewer>

        <div id="webxr-btn-zone" style="width: 100%;"></div>
    </div>

    <script type="module" src="./js/app.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const params = new URLSearchParams(window.location.search);
            const modelUrl = params.get('model');
            const fromValue = params.get('from');
            const viewer = document.getElementById('ios-fallback-viewer');

            if (fromValue) {
                const linkElement = document.getElementById('appLink');
            
                const newHref = `xri://${encodeURIComponent(fromValue)}`;
            
                linkElement.setAttribute('href', newHref);
            
            }

            if (modelUrl) {
                viewer.src = modelUrl;

                const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

                if (isIOS) {
                    viewer.setAttribute('ar', '');
                    viewer.setAttribute('ar-modes', 'quick-look');
                }
            }
        });
    </script>
</body>
</html>
